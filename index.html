<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent" />
    <meta name="theme-color" content="#092743" />

    <title>Rumduol Manager Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Moul&display=swap"
      rel="stylesheet" />

    <style>
      :root {
        --bg: #092743;
        --modal-bg: #0c3359;
        --gold: #cb9b51;
        --gold-gradient: linear-gradient(
          135deg,
          #f6e27a 0%,
          #d0a446 50%,
          #aa7c11 100%
        );
      }
      body {
        background-color: var(--bg);
        color: white;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
        /* បានដក user-select ចេញ ដើម្បីអាចវាយអក្សរ និងលេខទូរស័ព្ទបានធម្មតា */
        min-height: 100vh;
        overflow-x: hidden;
      }
      .font-moul {
        font-family: "Moul", serif;
      }
      .gold-bg {
        background: var(--gold-gradient);
      }
      .gold-text {
        color: var(--gold);
      }

      .app-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        transition: 0.3s;
      }
      .app-card:hover {
        border-color: rgba(203, 155, 81, 0.3);
      }

      .input-field {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 12px 16px;
        width: 100%;
        color: white;
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
        user-select: auto; /* ធានាថាអាចវាយនិង Copy/Paste បាន */
      }
      .input-field:focus {
        border-color: #cb9b51;
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 10px rgba(203, 155, 81, 0.2);
      }
      .input-field::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      #main-app {
        display: none;
      }

      /* Snackbar Animation */
      #restore-bar {
        transform: translateY(150%);
        transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      #restore-bar.show {
        transform: translateY(0);
      }

      /* Custom Scrollbar */
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: rgba(203, 155, 81, 0.5);
        border-radius: 10px;
      }
      .custom-scroll::-webkit-scrollbar-thumb:hover {
        background: #cb9b51;
      }
    </style>
  </head>
  <body>
    <!-- 1. 🛡️ LOGIN SCREEN -->
    <div
      id="login-screen"
      class="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-[#092743] px-8">
      <div
        class="w-20 h-20 mb-6 rounded-3xl gold-bg flex items-center justify-center shadow-[0_10px_40px_rgba(203,155,81,0.3)]">
        <svg
          class="w-10 h-10 text-[#092743]"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-moul gold-text mb-2 text-center drop-shadow-lg">
        Rumduol Admin
      </h1>
      <p
        class="text-[#cb9b51]/60 text-[10px] uppercase tracking-[0.4em] mb-10 font-bold">
        Access Control System
      </p>

      <div class="w-full max-w-xs">
        <input
          type="password"
          id="pw-input"
          class="input-field text-center text-2xl tracking-[0.5em] mb-6 py-4"
          placeholder="••••" />
        <button
          onclick="attemptLogin()"
          class="gold-bg text-[#092743] w-full py-4 rounded-xl font-bold uppercase tracking-widest hover:scale-105 active:scale-95 transition-all shadow-xl">
          Unlock App
        </button>
      </div>
    </div>

    <!-- 2. 📱 MAIN APP UI -->
    <div
      id="main-app"
      class="flex flex-col min-h-screen max-w-6xl mx-auto w-full">
      <header
        class="p-6 pt-10 md:pt-14 flex justify-between items-center sticky top-0 bg-[#092743]/90 backdrop-blur-md z-40 border-b border-white/5">
        <div>
          <h2 class="text-2xl font-moul gold-text">Manager Pro</h2>
          <p
            class="text-[10px] text-white/40 uppercase tracking-widest mt-1 font-bold">
            Safe Identity Storage
          </p>
        </div>
        <button
          onclick="openForm()"
          class="px-5 py-3 rounded-xl gold-bg flex items-center gap-2 shadow-[0_5px_20px_rgba(203,155,81,0.2)] hover:scale-105 active:scale-95 transition-all">
          <svg
            class="w-5 h-5 text-[#092743]"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M12 4v16m8-8H4"></path>
          </svg>
          <span class="text-[#092743] font-bold text-sm hidden md:block">New
            Identity</span>
        </button>
      </header>

      <div class="px-6 py-6">
        <div class="relative max-w-2xl mx-auto">
          <svg
            class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-white/30"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <input
            type="text"
            id="search"
            onkeyup="renderList()"
            placeholder="Search for customer name..."
            class="input-field pl-12 py-4" />
        </div>
      </div>

      <div
        id="user-list"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 px-6 pb-32">
        <!-- Cards will load here -->
      </div>
    </div>

    <!-- 3. 🔐 ACTION CONFIRM MODAL -->
    <div
      id="confirm-modal"
      class="fixed inset-0 z-[1200] hidden items-center justify-center bg-black/80 backdrop-blur-sm px-6">
      <div
        class="bg-[#0c3359] w-full max-w-sm rounded-3xl p-8 text-center border border-white/10 shadow-2xl">
        <div
          class="w-16 h-16 mx-auto bg-red-500/10 text-red-400 rounded-full flex items-center justify-center mb-4 border border-red-500/20">
          <svg
            class="w-8 h-8"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
          </svg>
        </div>
        <h3 class="text-xl font-moul gold-text mb-2">Confirm Action</h3>
        <p class="text-sm text-white/50 mb-6">Please enter admin password.</p>
        <input
          type="password"
          id="confirm-pw"
          class="input-field text-center text-xl tracking-[0.5em] mb-6"
          placeholder="••••" />
        <div class="flex gap-3">
          <button
            onclick="closeConfirm()"
            class="flex-1 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-white/70 font-bold transition-all">
            Cancel
          </button>
          <button
            onclick="validateAction()"
            class="flex-1 py-3 rounded-xl gold-bg text-[#092743] font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">
            Confirm
          </button>
        </div>
      </div>
    </div>

    <!-- 4. 📝 DATA FORM MODAL -->
    <div
      id="modal"
      class="fixed inset-0 z-[1100] hidden flex items-center justify-center bg-black/80 backdrop-blur-md p-4 sm:p-6">
      <div
        class="bg-[#0c3359] w-full max-w-4xl h-[90vh] md:h-[85vh] rounded-[24px] border border-white/10 flex flex-col overflow-hidden shadow-2xl relative">
        <div
          class="px-6 py-5 border-b border-white/10 flex justify-between items-center bg-[#092743]/50 z-10">
          <h3
            id="modal-title"
            class="text-xl md:text-2xl font-moul gold-text drop-shadow-md">
            New Identity
          </h3>
          <button
            onclick="closeForm()"
            class="w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-white/60 hover:text-white transition-colors">
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <form
          id="form"
          onsubmit="handleFormSubmit(event)"
          class="flex flex-col flex-1 overflow-hidden">
          <input type="hidden" id="u-id" />

          <div class="p-6 overflow-y-auto custom-scroll space-y-8 flex-1">
            <!-- Basic Info -->
            <div>
              <h4
                class="text-[11px] gold-text uppercase font-bold tracking-widest mb-3 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-[#cb9b51]"></span>
                Personal Detail
              </h4>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input
                  type="text"
                  id="u-name"
                  class="input-field"
                  placeholder="Full Name *"
                  required />
                <input
                  type="text"
                  id="u-title"
                  class="input-field"
                  placeholder="Job Title / Position" />
              </div>
            </div>

            <!-- Enhanced Images Grid (Supports Upload + Paste Link + Paste Image Ctrl+V) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <!-- Company Logo Upload/Paste Zone -->
              <div
                class="bg-black/20 p-4 rounded-xl border border-white/5 focus-within:border-[#cb9b51]/50 transition-colors">
                <label
                  class="text-[10px] text-white/60 uppercase font-bold block mb-3">Company
                  Logo</label>
                <div class="flex items-center gap-3">
                  <!-- Image Preview -->
                  <img
                    id="preview-logo"
                    src="https://via.placeholder.com/150?text=Logo"
                    class="w-14 h-14 rounded-lg object-cover border border-white/10 bg-black/50 flex-shrink-0 shadow-md" />

                  <!-- Input Field (Paste URL or Ctrl+V Image) -->
                  <input
                    type="text"
                    id="u-logo"
                    placeholder="Paste Link or Ctrl+V Image..."
                    class="input-field text-xs flex-1 py-3"
                    oninput="updatePreview('logo')"
                    onpaste="handlePaste(event, 'logo')" />

                  <!-- Browse File Button -->
                  <label
                    for="f-logo"
                    class="cursor-pointer gold-bg text-[#092743] p-3 rounded-xl shadow-md hover:scale-105 active:scale-95 transition-all flex-shrink-0"
                    title="Browse File">
                    <svg
                      class="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24">
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                  </label>
                  <input
                    type="file"
                    id="f-logo"
                    accept="image/*, .png, .jpg, .jpeg, .webp, .heic"
                    class="hidden"
                    onchange="handleFileUpload(this, 'logo')" />
                </div>
              </div>

              <!-- Profile Photo Upload/Paste Zone -->
              <div
                class="bg-black/20 p-4 rounded-xl border border-white/5 focus-within:border-[#cb9b51]/50 transition-colors">
                <label
                  class="text-[10px] text-white/60 uppercase font-bold block mb-3">Profile
                  Photo</label>
                <div class="flex items-center gap-3">
                  <!-- Image Preview -->
                  <img
                    id="preview-profile"
                    src="https://via.placeholder.com/150?text=Profile"
                    class="w-14 h-14 rounded-lg object-cover border border-white/10 bg-black/50 flex-shrink-0 shadow-md" />

                  <!-- Input Field (Paste URL or Ctrl+V Image) -->
                  <input
                    type="text"
                    id="u-profile"
                    placeholder="Paste Link or Ctrl+V Image..."
                    class="input-field text-xs flex-1 py-3"
                    oninput="updatePreview('profile')"
                    onpaste="handlePaste(event, 'profile')" />

                  <!-- Browse File Button -->
                  <label
                    for="f-profile"
                    class="cursor-pointer gold-bg text-[#092743] p-3 rounded-xl shadow-md hover:scale-105 active:scale-95 transition-all flex-shrink-0"
                    title="Browse File">
                    <svg
                      class="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24">
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                  </label>
                  <input
                    type="file"
                    id="f-profile"
                    accept="image/*, .png, .jpg, .jpeg, .webp, .heic"
                    class="hidden"
                    onchange="handleFileUpload(this, 'profile')" />
                </div>
              </div>
            </div>

            <!-- Phones Container -->
            <div>
              <h4
                class="text-[11px] gold-text uppercase font-bold tracking-widest mb-3 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-[#cb9b51]"></span>
                Contact Numbers
              </h4>
              <div
                id="phone-box"
                class="bg-black/20 p-4 rounded-xl border border-white/5 min-h-[70px]">
                <!-- Javascript will inject inputs here -->
              </div>
            </div>

            <!-- Social & Contact Links Grid -->
            <div>
              <h4
                class="text-[11px] gold-text uppercase font-bold tracking-widest mb-3 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-[#cb9b51]"></span>
                Social & Web Links
              </h4>
              <div
                class="bg-black/20 p-4 rounded-xl border border-white/5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                <input
                  type="email"
                  id="u-em"
                  placeholder="Email Address"
                  class="input-field" />
                <input
                  type="text"
                  id="u-web"
                  placeholder="Website URL"
                  class="input-field" />
                <input
                  type="text"
                  id="u-tg"
                  placeholder="Telegram Username / Link"
                  class="input-field" />
                <input
                  type="text"
                  id="u-wa"
                  placeholder="WhatsApp Number"
                  class="input-field" />
                <input
                  type="text"
                  id="u-fb"
                  placeholder="Facebook Profile URL"
                  class="input-field" />
                <input
                  type="text"
                  id="u-tk"
                  placeholder="TikTok URL"
                  class="input-field" />
                <input
                  type="text"
                  id="u-in"
                  placeholder="LinkedIn URL"
                  class="input-field md:col-span-2 lg:col-span-3" />
              </div>
            </div>

            <!-- VCF Data Grid -->
            <div>
              <h4
                class="text-[11px] text-white/50 uppercase font-bold tracking-widest mb-3 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-white/20"></span> VCF
                Detail (For Phonebook)
              </h4>
              <div
                class="bg-black/20 p-4 rounded-xl border border-white/5 grid grid-cols-1 md:grid-cols-2 gap-3 pb-8">
                <input
                  type="text"
                  id="u-vcf-f"
                  placeholder="First Name"
                  class="input-field" />
                <input
                  type="text"
                  id="u-vcf-l"
                  placeholder="Last Name"
                  class="input-field" />
                <input
                  type="text"
                  id="u-vcf-o"
                  placeholder="Organization / Company"
                  class="input-field md:col-span-2" />
              </div>
            </div>
          </div>

          <!-- Sticky Save Button Footer -->
          <div
            class="p-6 border-t border-white/10 bg-[#092743]/80 backdrop-blur-md">
            <button
              type="submit"
              class="gold-bg text-[#092743] w-full md:w-auto md:min-w-[250px] md:float-right py-4 px-8 rounded-xl font-bold uppercase tracking-widest shadow-[0_5px_20px_rgba(203,155,81,0.3)] hover:scale-105 active:scale-95 transition-all flex justify-center items-center gap-2">
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
              </svg>
              Save Identity
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- 5. ♻️ RESTORE SNACKBAR -->
    <div
      id="restore-bar"
      class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[1300] bg-white text-black px-6 py-4 rounded-2xl flex justify-between items-center shadow-2xl w-[90%] max-w-sm">
      <span class="text-sm font-bold">Item deleted.</span>
      <button
        onclick="restoreItem()"
        class="text-[#092743] font-black uppercase tracking-widest border-l border-black/10 pl-4 hover:text-[#cb9b51] transition-colors">
        Restore
      </button>
    </div>

    <!-- 6. 🌀 LOADER -->
    <div
      id="loader"
      class="fixed inset-0 z-[2000] hidden items-center justify-center bg-[#092743]/80 backdrop-blur-md">
      <div class="relative w-16 h-16 flex items-center justify-center">
        <div
          class="absolute inset-0 border-4 border-[#cb9b51]/20 rounded-full"></div>
        <div
          class="absolute inset-0 border-4 border-t-[#cb9b51] rounded-full animate-spin"></div>
        <svg
          class="w-6 h-6 text-[#cb9b51] animate-pulse"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
    </div>

    <!-- <script> របស់បងដាក់នៅទីនេះ -->
    <script>
      // 🔗 ដាក់ Link Web App របស់បងនៅទីនេះ
      const API =
        "https://script.google.com/macros/s/AKfycbyiY3VDk6dkhWOjoYYjdlU73bqJLHIkxhJCAcmqnCchIck09pij1BSXrpGs3RG0_jnStg/exec";

      let DATA = [];
      let PW = "";
      let PENDING_ACTION = null;
      let DELETED_CACHE = null;
      let RESTORE_TIMER = null;

      // ==========================================
      // 🛡️ 1. AUTHENTICATION (LOGIN)
      // ==========================================
      async function attemptLogin() {
        const val = document.getElementById("pw-input").value;
        if (!val) return;
        toggleLoader(true);
        try {
          const res = await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "getUsers", pw: val }),
          });
          const json = await res.json();

          if (json.status === "error") {
            alert("Incorrect Password!");
          } else {
            PW = val;
            DATA = json; // Backend returns formatted users with .phones string
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-app").style.display = "flex";
            renderList();
          }
        } catch (e) {
          alert("Connection error. Please check your internet.");
        }
        toggleLoader(false);
      }

      // ==========================================
      // 📝 2. FORM & DATA HANDLING (CRUD)
      // ==========================================

      // Open Form for New Identity
      function openForm() {
        document.getElementById("form").reset();
        document.getElementById("u-id").value = "";
        document.getElementById("preview-logo").src =
          "https://via.placeholder.com/150?text=Logo";
        document.getElementById("preview-profile").src =
          "https://via.placeholder.com/150?text=Profile";
        document.getElementById("modal-title").innerText = "New Identity";
        setupPhones(""); // Reset to 1 empty phone input
        document.getElementById("modal").style.display = "flex";
      }

      // Handle Save (Create or Update)
      async function handleFormSubmit(e) {
        e.preventDefault();
        toggleLoader(true);

        // Collect all phone numbers into a comma-separated string
        const phoneInputs = document.querySelectorAll(".p-in");
        const phonesString = Array.from(phoneInputs)
          .map((input) => input.value.trim())
          .filter((val) => val !== "")
          .join(",");

        const uData = {
          id: document.getElementById("u-id").value,
          name: document.getElementById("u-name").value,
          title: document.getElementById("u-title").value,
          logo_img: document.getElementById("u-logo").value,
          profile_img: document.getElementById("u-profile").value,
          phones: phonesString, // This matches backend expectation
          email: document.getElementById("u-em").value,
          website: document.getElementById("u-web").value,
          facebook: document.getElementById("u-fb").value,
          telegram: document.getElementById("u-tg").value,
          whatsapp: document.getElementById("u-wa").value,
          tiktok: document.getElementById("u-tk").value,
          linkedin: document.getElementById("u-in").value,
          vcf_first: document.getElementById("u-vcf-f").value,
          vcf_last: document.getElementById("u-vcf-l").value,
          vcf_org: document.getElementById("u-vcf-o").value,
        };

        try {
          const res = await fetch(API, {
            method: "POST",
            body: JSON.stringify({
              action: "saveUser",
              userData: uData,
              pw: PW,
            }),
          });
          const result = await res.json();
          if (result.status === "success") {
            alert("Data Saved to Cloud!");
            refreshData();
          } else {
            alert("Error: " + result.message);
          }
        } catch (e) {
          alert("Submission failed.");
        }
        toggleLoader(false);
      }

      // Load Data into Form for Editing
      function executeEdit(id) {
        const u = DATA.find((x) => x.id == id);
        if (!u) return;

        openForm();
        document.getElementById("modal-title").innerText = "Edit Identity";
        document.getElementById("u-id").value = u.id;
        document.getElementById("u-name").value = u.name || "";
        document.getElementById("u-title").value = u.title || "";

        // Images
        document.getElementById("u-logo").value = u.logo_img || "";
        document.getElementById("preview-logo").src =
          u.logo_img || "https://via.placeholder.com/150?text=Logo";
        document.getElementById("u-profile").value = u.profile_img || "";
        document.getElementById("preview-profile").src =
          u.profile_img || "https://via.placeholder.com/150?text=Profile";

        // Social
        document.getElementById("u-em").value = u.email || "";
        document.getElementById("u-web").value = u.website || "";
        document.getElementById("u-fb").value = u.facebook || "";
        document.getElementById("u-tg").value = u.telegram || "";
        document.getElementById("u-wa").value = u.whatsapp || "";
        document.getElementById("u-tk").value = u.tiktok || "";
        document.getElementById("u-in").value = u.linkedin || "";

        // VCF
        document.getElementById("u-vcf-f").value = u.vcf_first || "";
        document.getElementById("u-vcf-l").value = u.vcf_last || "";
        document.getElementById("u-vcf-o").value = u.vcf_org || "";

        setupPhones(u.phones); // backend formatUserForFrontend already provides this
      }

      // ==========================================
      // 🖼️ 3. IMAGE PROCESSING (COMPRESS & PREVIEW)
      // ==========================================

      function updatePreview(type) {
        const val = document.getElementById(`u-${type}`).value;
        document.getElementById(`preview-${type}`).src =
          val || `https://via.placeholder.com/150?text=${type}`;
      }

      function handlePaste(e, type) {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let index in items) {
          const item = items[index];
          if (item.kind === "file") {
            const blob = item.getAsFile();
            handleFileUpload({ files: [blob] }, type);
            e.preventDefault();
          }
        }
      }

      function handleFileUpload(input, type) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById(`preview-${type}`).src =
          "https://i.gifer.com/ZKZg.gif"; // Loading state

        const reader = new FileReader();
        reader.onload = function (e) {
          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement("canvas");
            const MAX_SIZE = 400;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_SIZE) {
                height *= MAX_SIZE / width;
                width = MAX_SIZE;
              }
            } else {
              if (height > MAX_SIZE) {
                width *= MAX_SIZE / height;
                height = MAX_SIZE;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            // Convert to Base64 (JPEG 0.7 quality is best for Google Drive upload)
            const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
            document.getElementById(`u-${type}`).value = dataUrl;
            updatePreview(type);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // ==========================================
      // 📞 4. DYNAMIC PHONE INPUTS (MAX 5)
      // ==========================================
      function setupPhones(str) {
        const box = document.getElementById("phone-box");
        box.innerHTML = "";
        const nums = str ? str.split(",") : [""];
        nums.forEach((n, i) => {
          if (i >= 5) return;
          addPhoneInput(n, i === 0);
        });
      }

      function addPhoneInput(val = "", isFirst = false) {
        const box = document.getElementById("phone-box");
        if (box.querySelectorAll(".p-in").length >= 5) return;

        const div = document.createElement("div");
        div.className = "flex gap-3 mb-3";
        div.innerHTML = `
      <input type="tel" class="p-in input-field" value="${val}" placeholder="Phone Number">
      ${
        isFirst
          ? `<button type="button" onclick="addPhoneInput()" class="gold-bg text-[#092743] font-bold px-5 rounded-xl">Add +</button>`
          : `<button type="button" onclick="this.parentElement.remove()" class="bg-red-500/20 text-red-400 font-bold px-5 rounded-xl">X</button>`
      }
    `;
        box.appendChild(div);
      }

      // ==========================================
      // 🗑️ 5. DELETE & RESTORE LOGIC
      // ==========================================
      function executeDelete(id) {
        const idx = DATA.findIndex((x) => x.id == id);
        DELETED_CACHE = DATA[idx];
        DATA.splice(idx, 1);
        renderList();

        const bar = document.getElementById("restore-bar");
        bar.classList.add("show");

        if (RESTORE_TIMER) clearTimeout(RESTORE_TIMER);
        RESTORE_TIMER = setTimeout(() => {
          bar.classList.remove("show");
          if (DELETED_CACHE) finalDeleteOnServer(id);
        }, 5000);
      }

      async function finalDeleteOnServer(id) {
        try {
          await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "deleteUser", id, pw: PW }),
          });
          DELETED_CACHE = null;
        } catch (e) {
          console.error("Delete sync failed");
        }
      }

      function restoreItem() {
        if (!DELETED_CACHE) return;
        clearTimeout(RESTORE_TIMER);
        DATA.push(DELETED_CACHE);
        DELETED_CACHE = null;
        document.getElementById("restore-bar").classList.remove("show");
        renderList();
      }

      // ==========================================
      // 🛠️ 6. UI UTILITIES
      // ==========================================
      function renderList() {
        const query = document.getElementById("search").value.toLowerCase();
        const list = document.getElementById("user-list");
        list.innerHTML = "";

        const filtered = DATA.filter(
          (u) => u.name && u.name.toLowerCase().includes(query),
        );

        filtered.forEach((u) => {
          const div = document.createElement("div");
          div.className =
            "app-card p-5 flex items-center gap-4 animate-in fade-in duration-300";
          div.innerHTML = `
        <img src="${u.profile_img || "https://via.placeholder.com/80"}" class="w-14 h-14 rounded-2xl object-cover border border-white/10">
        <div class="flex-1 min-w-0">
          <h4 class="font-bold truncate text-white">${u.name}</h4>
          <p class="text-[10px] gold-text uppercase truncate opacity-60">${u.title || "Identity"}</p>
        </div>
        <div class="flex gap-1">
          <button onclick="requestAction('view', '${u.id}')" class="w-8 h-8 rounded-lg bg-blue-500/20 text-blue-400 flex items-center justify-center">👁️</button>
          <button onclick="requestAction('edit', '${u.id}')" class="w-8 h-8 rounded-lg bg-green-500/20 text-green-400 flex items-center justify-center">✏️</button>
          <button onclick="requestAction('delete', '${u.id}')" class="w-8 h-8 rounded-lg bg-red-500/20 text-red-400 flex items-center justify-center">🗑️</button>
        </div>
      `;
          list.appendChild(div);
        });
      }

      async function refreshData() {
        try {
          const res = await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "getUsers", pw: PW }),
          });
          DATA = await res.json();
          renderList();
          closeForm();
        } catch (e) {
          console.error("Refresh failed");
        }
      }

      function requestAction(type, id) {
        PENDING_ACTION = { type, id };
        document.getElementById("confirm-modal").style.display = "flex";
      }

      function validateAction() {
        const inputPw = document.getElementById("confirm-pw").value;
        if (inputPw !== PW) {
          alert("Invalid Admin Password");
          return;
        }

        const { type, id } = PENDING_ACTION;
        closeConfirm();
        if (type === "edit") executeEdit(id);
        if (type === "delete") executeDelete(id);
        if (type === "view") window.open(`user.html?id=${id}`, "_blank");
      }

      function closeConfirm() {
        document.getElementById("confirm-modal").style.display = "none";
        document.getElementById("confirm-pw").value = "";
      }

      function closeForm() {
        document.getElementById("modal").style.display = "none";
      }
      function toggleLoader(s) {
        document.getElementById("loader").style.display = s ? "flex" : "none";
      }
    </script>
  </body>
</html>
